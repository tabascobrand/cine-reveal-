<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBJET REVEAL — Devine l'objet</title>
<link rel="icon" type="image/png" href="favicon.ico">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --panel: #12121a; --gold: #4ecdc4;
    --red: #e02d2d; --white: #f0eeea; --gray: #444455; --dim: #22222f;
  }
  body {
    background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif;
    height: 100vh; height: 100dvh; display: flex; flex-direction: column;
    align-items: center; padding: 0; overflow: hidden; position: relative;
  }
  header {
    width: 100%; padding: 18px 32px; display: flex;
    align-items: center; justify-content: space-between; border-bottom: 1px solid #1e1e2e;
    flex-shrink: 0;
  }
  .logo-wrap { display: flex; align-items: center; gap: 14px; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 4px; color: var(--gold); cursor: pointer; }
  .logo span { color: var(--white); }
  .back-btn {
    font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase;
    color: var(--gray); text-decoration: none; transition: color 0.2s;
  }
  .back-btn:hover { color: var(--white); }
  .score-display { display: flex; flex-direction: column; align-items: flex-end; }
  .score-label { font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gray); }
  .score-value { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--gold); line-height: 1; }
  .progress-bar-wrap { width: 100%; height: 3px; background: var(--dim); flex-shrink: 0; }
  .progress-bar-fill { height: 100%; background: var(--gold); transition: width 0.3s ease; }
  .game-area {
    width: 100%; max-width: 700px; padding: 16px 20px 16px;
    display: flex; flex-direction: column; align-items: center; gap: 14px;
    flex: 1; overflow: hidden;
  }
  .round-info {
    display: flex; justify-content: space-between; width: 100%;
    font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gray);
  }
  .poster-container {
    position: relative; width: 100%; max-width: 340px; aspect-ratio: 1/1;
    max-height: calc(100vh - 280px); max-height: calc(100dvh - 280px);
    margin: 0 auto;
    background: #000; overflow: hidden; border: 2px solid #1e1e2e; transition: border-color 0.15s;
  }
  .poster-container.flash-correct { border-color: var(--gold); }
  .poster-container.flash-wrong   { border-color: var(--red); }
  .poster-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
  .poster-img.hide  { visibility: hidden; }
  .poster-img.ready { visibility: visible; }
  .reveal-mask { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  .pts-badge {
    position: absolute; top: 12px; right: 12px;
    background: rgba(0,0,0,0.75); border: 1px solid var(--gold);
    color: var(--gold); font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem; padding: 4px 12px; letter-spacing: 2px; transition: color 0.3s;
  }
  .pts-badge.low { color: var(--red); border-color: var(--red); }
  .timer-wrap { width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 6px; }
  .timer-row { display: flex; justify-content: space-between; font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gray); }
  .timer-bar { width: 100%; height: 4px; background: var(--dim); border-radius: 2px; overflow: hidden; }
  .timer-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.1s linear, background 0.3s; }
  .timer-fill.urgent { background: var(--red); }
  .input-wrap { width: 100%; max-width: 440px; display: flex; gap: 10px; }
  .input-wrap input {
    flex: 1; background: var(--panel); border: 1px solid var(--gray); border-radius: 2px;
    color: var(--white); font-size: 1rem; font-family: 'Inter', sans-serif;
    padding: 12px 16px; outline: none; transition: border-color 0.2s; letter-spacing: 0.5px;
  }
  .input-wrap input:focus { border-color: var(--gold); }
  .input-wrap input.correct { border-color: var(--gold); background: #0d1e1e; }
  .input-wrap input.wrong   { border-color: var(--red); background: #200d0d; }
  .btn-skip {
    background: transparent; border: 1px solid var(--gray); color: var(--gray);
    font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase;
    padding: 0 16px; cursor: pointer; transition: all 0.2s; border-radius: 2px;
  }
  .btn-skip:hover { border-color: var(--white); color: var(--white); }
  .feedback { font-size: 0.8rem; letter-spacing: 1px; height: 20px; color: var(--gray); }
  .feedback.ok    { color: var(--gold); }
  .feedback.ko    { color: var(--red); }
  .feedback.fuzzy { color: #a0e8e4; }
  .screen {
    display: none; width: 100%; max-width: 440px;
    flex-direction: column; align-items: center; gap: 20px;
    padding: 40px 20px; text-align: center;
  }
  .screen.active { display: flex; }
  #screenEnd.active {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    overflow-y: auto; z-index: 10; background: var(--bg);
    display: flex; flex-direction: column; align-items: center;
    justify-content: flex-start;
    padding: 40px 20px 60px; gap: 20px; max-width: none; width: 100%;
  }
  .screen-title { font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 6px; color: var(--gold); }
  .screen-sub { color: var(--gray); font-size: 0.85rem; letter-spacing: 1px; line-height: 1.6; }
  .btn-primary {
    background: var(--gold); color: #000; font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem; letter-spacing: 3px; border: none; padding: 14px 40px;
    cursor: pointer; transition: opacity 0.2s; margin-top: 8px;
  }
  .btn-primary:hover { opacity: 0.85; }
  .final-breakdown { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .breakdown-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; background: var(--panel); border-left: 3px solid var(--dim); font-size: 0.85rem;
  }
  .breakdown-row.scored { border-left-color: var(--gold); }
  .breakdown-row .pts { font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: var(--gold); }
  @keyframes shake {
    0%,100%{ transform:translateX(0); } 15%{ transform:translateX(-7px); }
    30%{ transform:translateX(7px); } 45%{ transform:translateX(-5px); }
    60%{ transform:translateX(5px); } 75%{ transform:translateX(-3px); } 90%{ transform:translateX(3px); }
  }
  .poster-container.shaking { animation: shake 0.4s ease; }
  @keyframes flashGreen {
    0%{ box-shadow:0 0 0 0 rgba(78,205,196,0.5); }
    50%{ box-shadow:0 0 0 20px rgba(78,205,196,0); }
    100%{ box-shadow:none; }
  }
  .poster-container.correct-flash { animation: flashGreen 0.6s ease; }
  @media (max-height: 500px) {
    .game-area { padding: 8px 16px 0; gap: 8px; }
    .poster-container { max-height: 32vh; max-height: 32dvh; }
    header { padding: 8px 20px; }
  }
</style>
</head>
<body>
<header>
  <div class="logo-wrap">
    <div class="logo" onclick="goHome()">OBJET<span>REVEAL</span></div>
  </div>
  <div class="score-display">
    <div class="score-label">Score</div>
    <div class="score-value" id="headerScore">0</div>
  </div>
</header>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>

<div class="screen active" id="screenStart">
  <div class="screen-title">OBJET REVEAL</div>
  <button class="btn-primary" onclick="startGame()">JOUER</button>
</div>

<div class="game-area" id="gameArea" style="display:none">
  <div class="round-info">
    <span id="roundLabel">OBJET 1 / 20</span>
    <span id="revealPct">0% révélé</span>
  </div>
  <div class="poster-container" id="posterContainer">
    <img class="poster-img hide" id="posterImg" src="" alt="objet">
    <canvas class="reveal-mask" id="revealCanvas"></canvas>
    <div class="pts-badge" id="ptsBadge">100 pts</div>
  </div>
  <div class="timer-wrap">
    <div class="timer-row"><span>RÉVÉLATION</span><span id="timerLabel">0%</span></div>
    <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
  </div>
  <div class="input-wrap">
    <input type="text" id="answerInput" placeholder="Nom de l'objet… (Entrée pour valider)" autocomplete="off" spellcheck="false">
    <button class="btn-skip" id="skipBtn" onclick="skipItem()">PASSER</button>
  </div>
  <div class="feedback" id="feedback"></div>
</div>

<div class="screen" id="screenEnd">
  <div class="screen-title" id="endTitle">RÉSULTAT</div>
  <div class="screen-sub" id="endSub"></div>
  <div class="final-breakdown" id="breakdown"></div>
  <button class="btn-primary" onclick="restartGame()">REJOUER</button>
</div>

<script>
const AC = new (window.AudioContext || window.webkitAudioContext)();

function playWrong() {
  const buf=AC.createBuffer(1,AC.sampleRate*0.18,AC.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,1.5);
  const src=AC.createBufferSource(); src.buffer=buf;
  const g=AC.createGain(); g.gain.setValueAtTime(0.55,AC.currentTime); g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.22);
  const bq=AC.createBiquadFilter(); bq.type='bandpass'; bq.frequency.setValueAtTime(280,AC.currentTime); bq.frequency.exponentialRampToValueAtTime(80,AC.currentTime+0.18); bq.Q.value=1.2;
  src.connect(bq); bq.connect(g); g.connect(AC.destination); src.start();
}

function playCorrect() {
  const t = AC.currentTime;
  function makeReverb(dur, decay){
    const len = AC.sampleRate * dur;
    const buf = AC.createBuffer(2, len, AC.sampleRate);
    for(let c=0;c<2;c++){
      const d = buf.getChannelData(c);
      for(let i=0;i<len;i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/len, decay);
    }
    const conv = AC.createConvolver(); conv.buffer = buf; return conv;
  }
  const reverb = makeReverb(2.0, 2.2);
  const reverbGain = AC.createGain(); reverbGain.gain.value = 0.32;
  reverb.connect(reverbGain); reverbGain.connect(AC.destination);
  const master = AC.createGain(); master.gain.value = 0.055;
  master.connect(AC.destination); master.connect(reverb);
  const delay = AC.createDelay(0.7); delay.delayTime.value = 0.3;
  const delayGain = AC.createGain(); delayGain.gain.value = 0.18;
  delay.connect(delayGain); delayGain.connect(master);
  function playFlute(freq, start, dur, vol){
    const osc = AC.createOscillator(); const g = AC.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(freq, start);
    osc.frequency.linearRampToValueAtTime(freq * 1.003, start + dur * 0.7);
    g.gain.setValueAtTime(0, start); g.gain.linearRampToValueAtTime(vol, start + 0.05);
    g.gain.setValueAtTime(vol * 0.85, start + dur * 0.55);
    g.gain.exponentialRampToValueAtTime(0.001, start + dur);
    osc.connect(g); g.connect(master); g.connect(delay);
    osc.start(start); osc.stop(start + dur + 0.1);
    const bLen = Math.floor(AC.sampleRate * dur);
    const bBuf = AC.createBuffer(1, bLen, AC.sampleRate);
    const bd = bBuf.getChannelData(0);
    for(let i=0;i<bLen;i++) bd[i] = (Math.random()*2-1) * Math.pow(1-i/bLen, 1.8) * 0.018;
    const breath = AC.createBufferSource(); breath.buffer = bBuf;
    const bpf = AC.createBiquadFilter(); bpf.type = 'bandpass'; bpf.frequency.value = freq * 2.2; bpf.Q.value = 1.2;
    const bg = AC.createGain(); bg.gain.value = vol * 0.35;
    breath.connect(bpf); bpf.connect(bg); bg.connect(master); breath.start(start);
  }
  playFlute(523.25, t, 0.55, 1.0);
  playFlute(659.25, t + 0.15, 0.50, 0.75);
  playFlute(783.99, t + 0.28, 0.60, 0.55);
}

function levenshtein(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++) dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}
function normalize(str){ return str.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9 ]/g,''); }
function isFuzzyMatch(input,target){
  const a=normalize(input),b=normalize(target);
  if(a===b) return 'exact';
  const dist=levenshtein(a,b);
  const maxDist=b.length<=5?1:b.length<=10?2:3;
  return dist<=maxDist?'fuzzy':false;
}

// ── OBJETS — à remplir au fur et à mesure ─────────────────────────
const ITEMS = [
  // Exemple : {title:"Téléphone", accept:["telephone","tel"], src:"objet-images/telephone.jpg"}
];

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

const SESSION_SIZE = 20;
let globalQueue = [];
function getNextSession(){
  if(globalQueue.length < SESSION_SIZE){
    let pool = shuffle(shuffle([...ITEMS]));
    const offset = Math.floor(Math.random() * pool.length);
    globalQueue = [...pool.slice(offset), ...pool.slice(0, offset)];
  }
  const session = globalQueue.slice(0, SESSION_SIZE);
  globalQueue = globalQueue.slice(SESSION_SIZE);
  return session;
}

let queue,currentIdx,totalScore,roundScores,revealPct=0,revealInterval=null,currentPts=100,answered=false;
const REVEAL_STEP=0.4,TICK_MS=120,MAX_PTS=100;

function startGame(){
  document.getElementById('screenStart').classList.remove('active');
  document.getElementById('gameArea').style.display='flex';
  queue = getNextSession();
  currentIdx=0; totalScore=0; roundScores=[];
  loadItem();
}

function loadItem(){
  answered=false; revealPct=0; currentPts=MAX_PTS;
  const item=queue[currentIdx];
  const img=document.getElementById('posterImg');
  img.className='poster-img hide';
  const canvas=document.getElementById('revealCanvas');
  const container=document.getElementById('posterContainer');
  canvas.width=container.offsetWidth; canvas.height=container.offsetHeight;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
  img.src=item.src;
  const inp=document.getElementById('answerInput');
  inp.value=''; inp.className=''; inp.disabled=false;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('skipBtn').disabled=false;
  document.getElementById('progressFill').style.width=(currentIdx/queue.length*100)+'%';
  document.getElementById('roundLabel').textContent=`OBJET ${currentIdx+1} / ${queue.length}`;
  document.getElementById('posterContainer').className='poster-container';
  function onReady(){
    if(answered) return;
    img.className='poster-img ready';
    drawMask(0); startReveal(); inp.focus();
  }
  img.onerror=onReady;
  if(img.complete && img.naturalWidth>0) onReady();
  else { img.onload=onReady; setTimeout(()=>{ if(!answered && revealPct===0) onReady(); },5000); }
}

function drawMask(pct){
  const canvas=document.getElementById('revealCanvas');
  const container=document.getElementById('posterContainer');
  canvas.width=container.offsetWidth; canvas.height=container.offsetHeight;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height);
  const cx=canvas.width/2, cy=canvas.height/2;
  const frac=0.08+(1-0.08)*(pct/100);
  ctx.clearRect(cx-canvas.width*frac/2, cy-canvas.height*frac/2, canvas.width*frac, canvas.height*frac);
  const pi=Math.round(pct);
  document.getElementById('revealPct').textContent=pi+'% révélé';
  document.getElementById('timerFill').style.width=pct+'%';
  document.getElementById('timerLabel').textContent=pi+'%';
  document.getElementById('timerFill').classList.toggle('urgent',pct>70);
  currentPts=Math.max(0,Math.round(MAX_PTS*(1-pct/100)));
  const badge=document.getElementById('ptsBadge');
  badge.textContent=currentPts+' pts';
  badge.className='pts-badge'+(currentPts<30?' low':'');
}

function startReveal(){
  if(revealInterval) clearInterval(revealInterval);
  revealInterval=setInterval(()=>{
    if(answered) return;
    revealPct=Math.min(100,revealPct+REVEAL_STEP);
    drawMask(revealPct);
    document.getElementById('headerScore').textContent=totalScore;
    if(revealPct>=100){
      clearInterval(revealInterval);
      if(!answered){
        answered=true;
        playWrong();
        document.getElementById('posterImg').className='poster-img ready';
        document.getElementById('feedback').textContent='';
        document.getElementById('feedback').className='feedback';
        roundScores.push({title:queue[currentIdx].title,pts:0,missed:true});
        setTimeout(nextItem,2000);
      }
    }
  },TICK_MS);
}

document.getElementById('answerInput').addEventListener('keydown',function(e){
  if(e.key!=='Enter') return;
  if(answered) return;
  AC.resume();
  const item=queue[currentIdx];
  let matched=false, wasFuzzy=false;
  for(const alias of item.accept){
    const r=isFuzzyMatch(this.value,alias);
    if(r==='exact'){matched=true;wasFuzzy=false;break;}
    if(r==='fuzzy'){matched=true;wasFuzzy=true;}
  }
  if(matched) triggerCorrect(item,this,wasFuzzy);
  else triggerWrong(this);
});

function triggerCorrect(item,inp,wasFuzzy){
  clearInterval(revealInterval); answered=true;
  inp.className='correct'; inp.disabled=true;
  playCorrect();
  const pc=document.getElementById('posterContainer');
  pc.classList.add('flash-correct','correct-flash');
  const canvas=document.getElementById('revealCanvas');
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
  document.getElementById('posterImg').className='poster-img ready';
  const earned=currentPts; totalScore+=earned;
  roundScores.push({title:item.title,pts:earned,fuzzy:wasFuzzy});
  const fb=document.getElementById('feedback');
  fb.textContent=wasFuzzy?`✓ +${earned} pts (approximatif accepté !)`:`✓ +${earned} pts`;
  fb.className='feedback '+(wasFuzzy?'fuzzy':'ok');
  document.getElementById('headerScore').textContent=totalScore;
  document.getElementById('skipBtn').disabled=true;
  setTimeout(()=>{pc.classList.remove('correct-flash');nextItem();},1500);
}

function triggerWrong(inp){
  playWrong(); inp.className='wrong'; inp.select();
  const pc=document.getElementById('posterContainer');
  pc.classList.add('flash-wrong','shaking');
  pc.addEventListener('animationend',()=>pc.classList.remove('shaking','flash-wrong'),{once:true});
  document.getElementById('feedback').textContent='✗ Mauvaise réponse…';
  document.getElementById('feedback').className='feedback ko';
  setTimeout(()=>{inp.className='';},600);
}

function skipItem(){
  if(answered) return;
  clearInterval(revealInterval); answered=true;
  playWrong();
  roundScores.push({title:queue[currentIdx].title,pts:0,skipped:true});
  document.getElementById('posterImg').className='poster-img ready';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('answerInput').disabled=true;
  document.getElementById('skipBtn').disabled=true;
  setTimeout(nextItem,1500);
}

function nextItem(){ currentIdx++; if(currentIdx>=queue.length) endGame(); else loadItem(); }

function endGame(){
  clearInterval(revealInterval);
  document.getElementById('gameArea').style.display='none';
  document.getElementById('progressFill').style.width='100%';
  document.getElementById('screenEnd').classList.add('active');
  const max=queue.length*MAX_PTS, pct=Math.round((totalScore/max)*100);
  document.getElementById('endTitle').textContent=totalScore+' pts';
  document.getElementById('endSub').textContent=pct>=80?'Expert en objets !':pct>=50?'Pas mal…':'';
  document.getElementById('breakdown').innerHTML=roundScores.map(r=>`
    <div class="breakdown-row ${r.pts>0?'scored':''}">
      <span>${r.title}${r.fuzzy?' <span style="color:#a0e8e4;font-size:0.7em">~</span>':''}</span>
      <span class="pts">${r.pts>0?'+'+r.pts:r.skipped?'PASSÉ':'MANQUÉ'}</span>
    </div>`).join('');
}

function restartGame(){
  document.getElementById('screenEnd').classList.remove('active');
  document.getElementById('headerScore').textContent='0';
  document.getElementById('gameArea').style.display='flex';
  queue = getNextSession();
  currentIdx=0; totalScore=0; roundScores=[];
  loadItem();
}

function goHome(){
  clearInterval(revealInterval);
  document.getElementById('gameArea').style.display='none';
  document.getElementById('screenEnd').classList.remove('active');
  document.getElementById('screenStart').classList.add('active');
  document.getElementById('headerScore').textContent='0';
}
</script>
</body>
</html>
