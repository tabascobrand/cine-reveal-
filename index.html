<script>
const AC = new (window.AudioContext || window.webkitAudioContext)();

// --- AUDIO ---
function playWrong() {
  const buf=AC.createBuffer(1,AC.sampleRate*0.18,AC.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,1.5);
  const src=AC.createBufferSource(); src.buffer=buf;
  const g=AC.createGain(); g.gain.setValueAtTime(0.35,AC.currentTime); g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.18);
  const bq=AC.createBiquadFilter(); bq.type='bandpass'; bq.frequency.setValueAtTime(280,AC.currentTime); bq.frequency.exponentialRampToValueAtTime(80,AC.currentTime+0.18); bq.Q.value=1.2;
  src.connect(bq); bq.connect(g); g.connect(AC.destination); src.start();
}

function playCorrect() {
  [523.25,783.99].forEach((freq,i)=>{
    const osc=AC.createOscillator(),g=AC.createGain();
    osc.type='triangle'; osc.frequency.value=freq;
    const t=AC.currentTime+i*0.13;
    g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.25,t+0.02); g.gain.exponentialRampToValueAtTime(0.001,t+0.22);
    osc.connect(g); g.connect(AC.destination); osc.start(t); osc.stop(t+0.25);
  });
}

// --- UTILS ---
function levenshtein(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>[i,...Array(n).fill(0)]);
  for(let j=0;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function normalize(str){
  return str.toLowerCase().trim()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9 ]/g,'');
}

function isFuzzyMatch(input,target){
  const a=normalize(input),b=normalize(target);
  if(a===b) return 'exact';
  const dist=levenshtein(a,b);
  const maxDist=b.length<=5?1:b.length<=10?2:3;
  return dist<=maxDist?'fuzzy':false;
}

// --- 🎬 FILMS (CHARGÉS DEPUIS JSON) ---
let FILMS = [];

async function loadFilms(){
  const res = await fetch('films.json');
  const data = await res.json();

  FILMS = data.map(f => ({
    title: f.title,
    accept: [normalize(f.title)],
    clean: `images/${f.file}-clean.jpg`,
    full: `images/${f.file}.jpg`
  }));
}

// --- GAME STATE ---
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

let queue,currentIdx,totalScore,roundScores;
let revealPct=0,revealInterval=null,currentPts=100,answered=false;

const REVEAL_STEP=0.4,TICK_MS=120,MAX_PTS=100;

// --- START GAME ---
async function startGame(){
  await loadFilms();

  document.getElementById('screenStart').classList.remove('active');
  document.getElementById('gameArea').style.display='flex';

  queue=shuffle(FILMS);
  currentIdx=0;
  totalScore=0;
  roundScores=[];

  loadFilm();
}

// --- LOAD FILM ---
function loadFilm(){
  answered=false;
  revealPct=0;
  currentPts=MAX_PTS;

  const film=queue[currentIdx];

  const imgC=document.getElementById('posterImgClean');
  const imgF=document.getElementById('posterImgFull');

  imgC.className='poster-img hide';
  imgF.className='poster-img hide';

  const canvas=document.getElementById('revealCanvas');
  const container=document.getElementById('posterContainer');

  canvas.width=container.offsetWidth;
  canvas.height=container.offsetHeight;

  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  imgC.src=film.clean;
  imgF.src=film.full;

  const inp=document.getElementById('answerInput');
  inp.value='';
  inp.className='';
  inp.disabled=false;

  document.getElementById('feedback').textContent='';
  document.getElementById('skipBtn').disabled=false;

  document.getElementById('roundLabel').textContent=
    `AFFICHE ${currentIdx+1} / ${queue.length}`;

  function onReady(){
    imgC.className='poster-img ready';
    drawMask(0);
    startReveal();
    inp.focus();
  }

  if(imgC.complete) onReady();
  else imgC.onload=onReady;
}

// --- MASK ---
function drawMask(pct){
  const canvas=document.getElementById('revealCanvas');
  const container=document.getElementById('posterContainer');

  canvas.width=container.offsetWidth;
  canvas.height=container.offsetHeight;

  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const cx=canvas.width/2, cy=canvas.height/2;
  const frac=0.08+(1-0.08)*(pct/100);

  ctx.clearRect(
    cx-canvas.width*frac/2,
    cy-canvas.height*frac/2,
    canvas.width*frac,
    canvas.height*frac
  );
}

// --- REVEAL LOOP ---
function startReveal(){
  if(revealInterval) clearInterval(revealInterval);

  revealInterval=setInterval(()=>{
    if(answered) return;

    revealPct=Math.min(100,revealPct+REVEAL_STEP);
    drawMask(revealPct);

    if(revealPct>=100){
      clearInterval(revealInterval);
      if(!answered){
        answered=true;
        skipAuto();
      }
    }
  },TICK_MS);
}

// --- AUTO FAIL ---
function skipAuto(){
  roundScores.push({title:queue[currentIdx].title,pts:0,missed:true});
  nextFilm();
}

// --- INPUT ---
document.getElementById('answerInput').addEventListener('keydown',function(e){
  if(e.key!=='Enter' || answered) return;

  AC.resume();

  const film=queue[currentIdx];
  let matched=false, wasFuzzy=false;

  for(const alias of film.accept){
    const r=isFuzzyMatch(this.value,alias);
    if(r==='exact'){matched=true;break;}
    if(r==='fuzzy'){matched=true;wasFuzzy=true;}
  }

  if(matched) triggerCorrect(film,wasFuzzy);
  else triggerWrong();
});

// --- CORRECT ---
function triggerCorrect(film,wasFuzzy){
  clearInterval(revealInterval);
  answered=true;

  playCorrect();

  const earned=currentPts;
  totalScore+=earned;

  roundScores.push({title:film.title,pts:earned,fuzzy:wasFuzzy});

  nextFilm();
}

// --- WRONG ---
function triggerWrong(){
  playWrong();
}

// --- NEXT ---
function nextFilm(){
  currentIdx++;
  if(currentIdx>=queue.length){
    alert("FIN");
  } else {
    loadFilm();
  }
}

// --- SKIP ---
function skipFilm(){
  if(answered) return;
  clearInterval(revealInterval);
  answered=true;
  roundScores.push({title:queue[currentIdx].title,pts:0,skipped:true});
  nextFilm();
}
</script>
